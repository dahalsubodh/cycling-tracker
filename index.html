<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1a12">
<title>Ride Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0f1a12;
    --surface: #172019;
    --card: #1e2b20;
    --border: rgba(255,255,255,0.08);
    --text: #e8f0e9;
    --muted: #7a9b7e;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);
    --accent-border: rgba(74,222,128,0.3);
    --red: #f87171;
    --blue: #60a5fa;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
  
  body {
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
  }

  header {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }

  .header-title { font-size: 16px; font-weight: 600; }

  .settings-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.2s;
  }
  .settings-btn:active { background: rgba(74,222,128,0.2); }

  #map {
    height: 300px;
    flex-shrink: 0;
    position: relative;
    background: var(--card);
  }

  .stats-container {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    padding: 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .stat-box {
    background: var(--card);
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    text-align: center;
  }

  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .stat-value { font-size: 20px; font-weight: 600; color: var(--accent); margin-top: 4px; }

  .controls {
    display: flex;
    gap: 8px;
    padding: 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:active { background: #3dc265; }

  .btn-secondary {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:active { background: var(--surface); }

  .scrollable {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .section {
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .waypoint-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .waypoint-item {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .waypoint-info { flex: 1; }
  .waypoint-name { font-size: 13px; font-weight: 500; }
  .waypoint-coords { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .btn-remove {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(248,113,113,0.3);
    padding: 4px 8px;
    font-size: 10px;
    border-radius: 4px;
    cursor: pointer;
  }

  /* Modal */
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal.show { display: flex; }

  .modal-content {
    background: var(--surface);
    border-radius: 12px;
    padding: 20px;
    max-width: 400px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-dim);
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .modal-actions button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
  }

  .modal-actions .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }

  .modal-actions .btn-secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .error { color: var(--red); font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-title">🗺️ Ride Tracker</div>
  <button class="settings-btn" onclick="openWaypointModal()">Add Waypoint</button>
</header>

<div id="map"></div>

<div class="stats-container">
  <div class="stat-box">
    <div class="stat-label">Distance</div>
    <div class="stat-value" id="distance">0 km</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">Time</div>
    <div class="stat-value" id="time">0:00</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">Speed</div>
    <div class="stat-value" id="speed">0 km/h</div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-primary" id="startBtn" onclick="startRide()">Start Ride</button>
  <button class="btn btn-secondary" id="stopBtn" onclick="stopRide()" style="display:none;">Stop Ride</button>
</div>

<div class="scrollable">
  <div class="section">
    <div class="section-title">Waypoints</div>
    <div class="waypoint-list" id="waypointList">
      <div style="color: var(--muted); font-size: 12px;">No waypoints yet. Click "Add Waypoint" to get started.</div>
    </div>
  </div>
</div>

<!-- Add Waypoint Modal -->
<div id="waypointModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">Add Waypoint</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="form-input" id="wpName" placeholder="e.g., Starting Point">
    </div>
    <div class="form-group">
      <label class="form-label">Latitude</label>
      <input type="number" class="form-input" id="wpLat" placeholder="e.g., 27.7172" step="0.0001">
    </div>
    <div class="form-group">
      <label class="form-label">Longitude</label>
      <input type="number" class="form-input" id="wpLng" placeholder="e.g., 85.3240" step="0.0001">
    </div>
    <div id="errorMsg" class="error"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeWaypointModal()">Cancel</button>
      <button class="btn-primary" onclick="addWaypoint()">Add</button>
    </div>
  </div>
</div>

<script>
let map = null;
let posMarker = null;
let posCircle = null;
let routeLine = null;
let waypoints = [];
let waypointMarkers = [];
let rideActive = false;
let rideData = {
  startTime: null,
  distance: 0,
  lastPos: null,
  positions: []
};

// Initialize map
function initMap() {
  if (!map) {
    map = L.map('map', {
      zoomControl: false,
      attributionControl: false,
      dragging: true,
      scrollWheelZoom: false,
    }).setView([27.605, 85.332], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18
    }).addTo(map);

    routeLine = L.polyline([], {color: '#4ade80', weight: 3, opacity: 0.7}).addTo(map);
  }
}

// Watch position for live tracking
function watchPosition() {
  if (!navigator.geolocation) {
    alert('Geolocation not supported');
    return;
  }

  navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const accuracy = pos.coords.accuracy;

    // Update or create position marker
    if (!posMarker) {
      posMarker = L.marker([lat, lng], {
        icon: L.icon({
          iconUrl: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30"><circle cx="15" cy="15" r="8" fill="%234ade80" stroke="white" stroke-width="2"/><circle cx="15" cy="15" r="3" fill="white"/></svg>',
          iconSize: [30, 30],
          iconAnchor: [15, 15]
        })
      }).addTo(map);

      posCircle = L.circle([lat, lng], {
        radius: accuracy,
        color: '#4ade80',
        opacity: 0.2,
        fill: false
      }).addTo(map);
    } else {
      posMarker.setLatLng([lat, lng]);
      posCircle.setLatLng([lat, lng]);
      posCircle.setRadius(accuracy);
    }

    if (rideActive) {
      rideData.positions.push([lat, lng]);
      
      // Calculate distance
      if (rideData.lastPos) {
        const dist = getDistance(rideData.lastPos[0], rideData.lastPos[1], lat, lng);
        rideData.distance += dist;
      }
      rideData.lastPos = [lat, lng];

      // Update route line
      routeLine.setLatLngs(rideData.positions);
      
      // Update stats
      updateStats();
    }

    // Center map on position
    map.panTo([lat, lng]);
  });
}

// Haversine formula to calculate distance between two points
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371; // Earth's radius in km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + 
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
            Math.sin(dLng/2) * Math.sin(dLng/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// Start ride
function startRide() {
  rideActive = true;
  rideData = {
    startTime: Date.now(),
    distance: 0,
    lastPos: null,
    positions: []
  };
  routeLine.setLatLngs([]);
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'block';
  watchPosition();
}

// Stop ride
function stopRide() {
  rideActive = false;
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
}

// Update stats display
function updateStats() {
  const distKm = rideData.distance.toFixed(2);
  let timeStr = '0:00';
  let speed = 0;
  
  if (rideActive && rideData.startTime) {
    const time = Math.floor((Date.now() - rideData.startTime) / 1000);
    const hours = Math.floor(time / 3600);
    const minutes = Math.floor((time % 3600) / 60);
    const seconds = time % 60;
    timeStr = hours > 0 ? `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}` : `${minutes}:${seconds.toString().padStart(2, '0')}`;
    speed = time > 0 ? (rideData.distance / (time / 3600)).toFixed(1) : 0;
  }

  document.getElementById('distance').textContent = distKm + ' km';
  document.getElementById('time').textContent = timeStr;
  document.getElementById('speed').textContent = speed + ' km/h';
}

// Waypoint management
function openWaypointModal() {
  document.getElementById('waypointModal').classList.add('show');
  document.getElementById('wpName').focus();
}

function closeWaypointModal() {
  document.getElementById('waypointModal').classList.remove('show');
  document.getElementById('errorMsg').textContent = '';
  document.getElementById('wpName').value = '';
  document.getElementById('wpLat').value = '';
  document.getElementById('wpLng').value = '';
}

function addWaypoint() {
  const name = document.getElementById('wpName').value.trim();
  const lat = parseFloat(document.getElementById('wpLat').value);
  const lng = parseFloat(document.getElementById('wpLng').value);
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.textContent = '';

  if (!name) {
    errorMsg.textContent = 'Please enter a name';
    return;
  }

  if (isNaN(lat) || isNaN(lng)) {
    errorMsg.textContent = 'Invalid coordinates';
    return;
  }

  if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
    errorMsg.textContent = 'Coordinates out of range';
    return;
  }

  waypoints.push({ name, lat, lng, id: Date.now() });
  renderWaypoints();
  closeWaypointModal();

  // Add marker to map
  const marker = L.marker([lat, lng], {
    icon: L.icon({
      iconUrl: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 40"><path d="M15 0C8.4 0 3 5.4 3 12c0 9 12 28 12 28s12-19 12-28c0-6.6-5.4-12-12-12z" fill="%2360a5fa" stroke="white" stroke-width="1.5"/><circle cx="15" cy="12" r="4" fill="white"/></svg>',
      iconSize: [30, 40],
      iconAnchor: [15, 40]
    }),
    title: name
  }).addTo(map).bindPopup(`<b>${name}</b><br>${lat.toFixed(4)}, ${lng.toFixed(4)}`);

  waypointMarkers.push(marker);
}

function removeWaypoint(id) {
  const idx = waypoints.findIndex(w => w.id === id);
  if (idx >= 0) {
    waypoints.splice(idx, 1);
    waypointMarkers[idx].remove();
    waypointMarkers.splice(idx, 1);
    renderWaypoints();
  }
}

function renderWaypoints() {
  const list = document.getElementById('waypointList');
  if (waypoints.length === 0) {
    list.innerHTML = '<div style="color: var(--muted); font-size: 12px;">No waypoints yet. Click "Add Waypoint" to get started.</div>';
    return;
  }

  list.innerHTML = waypoints.map(wp => `
    <div class="waypoint-item">
      <div class="waypoint-info">
        <div class="waypoint-name">${wp.name}</div>
        <div class="waypoint-coords">${wp.lat.toFixed(4)}, ${wp.lng.toFixed(4)}</div>
      </div>
      <button class="btn-remove" onclick="removeWaypoint(${wp.id})">Remove</button>
    </div>
  `).join('');
}

// Initialize
initMap();
updateStats();
setInterval(updateStats, 1000);
</script>

</body>
</html>
